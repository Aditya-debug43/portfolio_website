<!-- ── LOGIN OVERLAY ─────────────────────────────────────────────── -->
<div class="overlay" id="loginOverlay" onclick="bgClose('loginOverlay',event)">
  <div class="login-box">
    <h3 data-t="login_title">Admin Login</h3>
    <p data-t="login_sub">Enter your admin password to manage site content.</p>
    <div class="fg">
      <label data-t="login_pwd_l">Password</label>
      <input type="password" id="loginPwd" onkeydown="if(event.key==='Enter')tryLogin()">
    </div>
    <div class="login-err" id="loginErr" data-t="login_err">Incorrect password. Please try again.</div>
    <button class="sbtn btn-login-submit" onclick="tryLogin()" data-t="login_btn">Login →</button>
    <button onclick="closeOverlay('loginOverlay')" class="btn-cancel" data-t="cancel">Cancel</button>
  </div>
</div>

<!-- ── ADMIN OVERLAY ─────────────────────────────────────────────── -->
<div class="overlay" id="adminOverlay" onclick="bgClose('adminOverlay',event)">
  <div class="modal">
    <div class="mhead">
      <h2>Admin Panel</h2>
      <button class="mclose" onclick="closeOverlay('adminOverlay')">✕ Close</button>
    </div>
    <div class="mtabs">
      <button class="mtab on" onclick="switchTab('brand',this)">Logo & Brand</button>
      <button class="mtab" onclick="switchTab('port',this)">Portfolio</button>
      <button class="mtab" onclick="switchTab('price',this)">Pricing</button>
    </div>
    <div class="mcontent">

      <!-- Brand Tab -->
      <div id="msec-brand" class="msec on">
        <div class="banner" id="bBrand">✓ Brand settings saved!</div>
        <div class="arow2">
          <div class="af"><label>Studio Name</label><input type="text" id="aName"></div>
          <div class="af"><label>Tagline</label><input type="text" id="aTag"></div>
        </div>
        <div class="logo-upload-row">
          <div class="lp-box" id="logoPreview"><span class="txt-no-logo">No logo</span></div>
          <div class="af"><label>Logo Image URL</label><input type="text" id="aLogo" placeholder="https://..."></div>
          <button class="abtn abtn-add" onclick="prevLogo()">Preview</button>
        </div>
        <div class="arow2">
          <div class="af"><label>WhatsApp Number</label><input type="text" id="aWa"></div>
          <div class="af"><label>Email</label><input type="text" id="aEmail"></div>
        </div>
        <div class="af mb-3">
          <label>Change Admin Password</label>
          <input type="password" id="aNewPwd" placeholder="Leave blank to keep current">
        </div>
        <button class="abtn abtn-save" onclick="saveBrand()">Save Brand Settings</button>
      </div>

      <!-- Portfolio Tab -->
      <div id="msec-port" class="msec">
        <div class="banner" id="bPort">✓ Portfolio updated!</div>
        <div class="admin-add-card">
          <p class="admin-section-title">Add New Design</p>
          <div class="arow2">
            <div class="af"><label>Title</label><input type="text" id="nTitle" placeholder="Design name"></div>
            <div class="af">
              <label>Category</label>
              <select id="nCat">
                <option>Curtain</option>
                <option>Sherwani</option>
                <option>Brocade</option>
                <option>Lace</option>
                <option>Saree</option>
                <option>Top</option>
                <option>Dupatta</option>
                <option>Dupatta (Two-Sided Daman)</option>
                <option>Buti (All-Over)</option>
                <option>Daman / Border</option>
                <option>Kali</option>
                <option>Blouse</option>
              </select>
            </div>
          </div>
          <div class="arow2">
            <div class="af"><label>Image URL</label><input type="text" id="nImg" placeholder="https://..."></div>
            <div class="af"><label>Year (optional)</label><input type="text" id="nYear" placeholder="2024"></div>
          </div>
          <div class="af mb-3"><label>Description</label><input type="text" id="nDesc" placeholder="Short description"></div>
          <button class="abtn abtn-add" onclick="addItem()">+ Add to Portfolio</button>
        </div>
        <div class="plist" id="adminPlist"></div>
      </div>

      <!-- Pricing Tab -->
      <div id="msec-price" class="msec">
        <div class="banner" id="bPrice">✓ Pricing saved!</div>
        <p class="admin-hint-text mb-3">Edit type name and price for each row.</p>
        <div id="priceRows"></div>
        <button class="abtn abtn-save" onclick="savePricing()">Save Pricing</button>
      </div>

    </div>
  </div>
</div>

<!-- ── LIGHTBOX ───────────────────────────────────────────────────── -->
<div class="lb" id="lb" onclick="lbBg(event)">
  <button class="lb-cls" onclick="closeLb()">✕</button>
  <div class="lb-inner" id="lbInner"></div>
</div>

<!-- ── POLICY OVERLAY ────────────────────────────────────────────── -->
<div class="overlay" id="policyOverlay" onclick="bgClose('policyOverlay',event)">
  <div class="modal modal-sm">
    <div class="mhead">
      <h2 id="policyTitle">Policy</h2>
      <button class="mclose" onclick="closeOverlay('policyOverlay')">✕ Close</button>
    </div>
    <div class="mcontent policy-content" id="policyBody"></div>
  </div>
</div>
